run-name: Publish

on:
  workflow_dispatch:
    inputs:
      semver:
        type: choice
        description: Choose the semver
        options:
          - "Patch - Backward compatible bug fixes"
          - "Minor - Adding functionality in a backward compatible manner"
          - "Major - Incompatible API changes"

env:
  APP_NAME: "SimpleSteamWrapper"
  SEMVER_UPDATE: "${{ inputs.semver }}"

jobs:
  build:
    runs-on: skydust-runner
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    
    container:
      image: "public.ecr.aws/docker/library/rust:1.88.0-alpine3.21"
    steps:
      - name: Prepare runner deps
        run: |
          apk --no-cache add nodejs git bash npm curl jq
          npm config set @skydust:registry=https://gitea.skydust.fr/api/packages/skydust/npm/
          npm install -g @skydust/toolkit@latest

      - name: Prepare build deps
        run: |
          apk --no-cache add docker build-base perl clang llvm musl-dev libgcc libstdc++ openssl-libs-static openssl-dev cmake make pkgconfig curl
          echo "CC=clang" >> $GITEA_ENV
          echo "CXX=clang++" >> $GITEA_ENV
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Checkout
        uses: actions/checkout@v4

      - name: Getting version
        uses: https://gitea.skydust.fr/actions/get-version@v1

      - name: Update rust package version
        run: |
          log_info "Updating Cargo.toml version to $(yellow)$NEW_VERSION"
          sed -Ei "s|^(version = \")[^\"]*|\1${NEW_VERSION}|" Cargo.toml
          cat Cargo.toml

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Archive binary
        run: |
          OUT_DIR=release/${{ matrix.target }}
          mkdir -p $OUT_DIR
          cp target/${{ matrix.target }}/release/${APP_NAME}* $OUT_DIR/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/${{ matrix.target }}
  
  release:
    name: Validate release
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: skydust-runner
    steps:
      - name: Release
        uses: https://gitea.skydust.fr/actions/create-release@v1
        with:
          semver: ${{ inputs.semver }}
          token: ${{ secrets.CI_TOKEN }}

  publish:
    name: Publishing package
    needs: release
    runs-on: skydust-runner
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Getting version
        uses: https://gitea.skydust.fr/actions/get-version@v1

      - name: Create Release
        uses: https://gitea.com/actions/gitea-release-action
        with:
          files: dist/**/*
          name: "v${{ env.NEW_VERSION }}"
          token: ${{ secrets.GITEA_SERVER_URL }}
